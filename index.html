<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#16181d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Workouts" />
<title>Workout Tracker</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="app-header">
  <h1>Workouts</h1>
  <button id="settingsBtn" class="icon-btn" aria-label="Settings">⚙</button>
</header>

<main id="view" class="view"></main>

<nav class="tabbar">
  <button class="tab-btn" data-tab="log"><span class="tab-icon">🏋</span><span>Log</span></button>
  <button class="tab-btn" data-tab="plans"><span class="tab-icon">📋</span><span>Plans</span></button>
  <button class="tab-btn" data-tab="progress"><span class="tab-icon">📈</span><span>Progress</span></button>
  <button class="tab-btn" data-tab="history"><span class="tab-icon">🗓</span><span>History</span></button>
</nav>

<div id="modalRoot"></div>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
</body>
</html>
